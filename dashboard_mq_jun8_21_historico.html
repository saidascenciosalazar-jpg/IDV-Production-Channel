    kpiV:{fontSize:26,fontWeight:700,color:"#f9fafb"},
    kpiL:{fontSize:11,color:"#9ca3af",marginTop:4,textTransform:"uppercase",letterSpacing:"0.05em"},
    tabBtn:a=>({padding:"7px 18px",borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer",border:"none",background:a?"#3b82f6":"transparent",color:a?"#fff":"#9ca3af"}),
    card:{background:"#1e2130",borderRadius:10,overflow:"hidden",border:"1px solid #374151"},
    th:{background:"#161d2e",padding:"10px 14px",fontSize:11,color:"#6b7280",textAlign:"left",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600},
    td:{padding:"9px 14px",fontSize:13,borderBottom:"1px solid #1f2937"},
    link:{color:"#60a5fa",textDecoration:"none",fontSize:11}
  };

  const heatColor = v => {
    if(!v) return "#1e2130";
    if(v<5) return "#dc2626";
    const t=Math.min((v-5)/25,1);
    return `rgb(${Math.round(187-163*t)},${Math.round(247-164*t)},${Math.round(208-162*t)})`;
  };

  const GAP_OPTIONS=[{label:"Más de 10 min",value:10},{label:"Más de 20 min",value:20},{label:"Más de 30 min",value:30}];
  const filteredGaps=gaps=>gaps.filter(g=>g.m>gapMin);

  if(!data) return React.createElement("div",{style:{padding:32}},"Cargando…");
  const {ahtRows,totalCases,deadCases,deadTime,wAht,deadRows,heatMap,hours}=data;

  const ce = React.createElement;

  return ce("div",{style:S.root},
    // ── Header ──
    ce("div",{style:{display:"flex",alignItems:"center",gap:16,marginBottom:20,flexWrap:"wrap"}},
      ce("div",{style:S.title},"Dashboard MQ · CDMX"),
      ce("select",{style:S.weekSel,value:weekIdx,onChange:e=>{setWeekIdx(Number(e.target.value));setAg("All");}},
        WEEKS_CONFIG.map((w,i)=>ce("option",{key:i,value:i},w.label))
      ),
      ce("div",{style:S.badge},"Hora CDMX (CST UTC-6)"),
      ce("div",{style:{fontSize:11,color:"#6b7280",marginLeft:"auto"}},WEEKS.length," semanas en histórico")
    ),
    // ── TL / Agent filters ──
    ce("div",{style:{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}},
      ce("select",{style:S.sel,value:tl,onChange:e=>{setTl(e.target.value);setAg("All");}},
        tls.map(t=>ce("option",{key:t},t))
      ),
      ce("select",{style:S.sel,value:ag,onChange:e=>setAg(e.target.value)},
        agents.map(a=>ce("option",{key:a},a))
      )
    ),
    // ── KPIs ──
    ce("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}},
      ce("div",{style:S.kpi},ce("div",{style:S.kpiV},fmtMin(wAht)),ce("div",{style:S.kpiL},"AHT Promedio")),
      ce("div",{style:S.kpi},ce("div",{style:S.kpiV},totalCases.toLocaleString()),ce("div",{style:S.kpiL},"Total Casos")),
      ce("div",{style:S.kpi},ce("div",{style:{...S.kpiV,color:deadCases>20?"#f87171":"#34d399"}},deadCases),ce("div",{style:S.kpiL},"Casos >15 min")),
      ce("div",{style:S.kpi},ce("div",{style:{...S.kpiV,color:"#fbbf24"}},(deadTime/60).toFixed(1),"h"),ce("div",{style:S.kpiL},"Dead Time Total"))
    ),
    // ── Tabs ──
    ce("div",{style:{display:"flex",gap:2,marginBottom:16,background:"#1e2130",padding:4,borderRadius:10,width:"fit-content"}},
      ["AHT por Queue","Dead Time","Por Hora CDMX","Gaps"].map((t,i)=>ce("button",{key:i,style:S.tabBtn(tab===i),onClick:()=>setTab(i)},t))
    ),
    // ── Tab 0: AHT ──
    tab===0 && ce("div",{style:S.card},
      ce("table",{style:{width:"100%",borderCollapse:"collapse"}},
        ce("thead",null,ce("tr",null,["Queue","Casos","AHT"].map(h=>ce("th",{key:h,style:S.th},h)))),
        ce("tbody",null,
          ahtRows.map((r,i)=>{
            const barW=Math.round((r.c/Math.max(...ahtRows.map(x=>x.c)))*100);
            return ce("tr",{key:i,style:{background:i%2?"#161d2e":"transparent"}},
              ce("td",{style:S.td},QUEUE_SHORT[r.q]||r.q),
              ce("td",{style:S.td},
                ce("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  ce("div",{style:{width:80,height:6,background:"#374151",borderRadius:3}},
                    ce("div",{style:{width:`${barW}%`,height:"100%",background:"#3b82f6",borderRadius:3}})
                  ),
                  r.c.toLocaleString()
                )
              ),
              ce("td",{style:{...S.td,fontWeight:600,color:r.aht>15?"#f87171":r.aht>8?"#fbbf24":"#34d399"}},fmtMin(r.aht))
            );
          }),
          ahtRows.length===0&&ce("tr",null,ce("td",{colSpan:3,style:{...S.td,textAlign:"center",color:"#6b7280"}},"Sin datos"))
        )
      )
    ),
    // ── Tab 1: Dead Time ──
    tab===1 && ce(React.Fragment,null,
      ce("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
        ce("span",{style:{fontSize:13,color:"#9ca3af"}},"Filtrar HT ≥"),
        [15,20,30,45,60].map(v=>ce("button",{key:v,onClick:()=>setDtFilter(v),style:{...S.tabBtn(dtFilter===v),padding:"5px 12px"}},v," min")),
        ce("span",{style:{fontSize:12,color:"#6b7280",marginLeft:8}},deadRows.length," casos")
      ),
      ce("div",{style:S.card},
        ce("table",{style:{width:"100%",borderCollapse:"collapse"}},
          ce("thead",null,ce("tr",null,["Día","Queue","Agente","HT","Resolución","Unity Link"].map(h=>ce("th",{key:h,style:S.th},h)))),
          ce("tbody",null,
            deadRows.map((r,i)=>ce("tr",{key:i,style:{background:i%2?"#161d2e":"transparent"}},
              ce("td",{style:S.td},DAY_LABEL[r.d]||r.d),
              ce("td",{style:S.td},QUEUE_SHORT[r.q]||r.q),
              ce("td",{style:S.td},r.agentName),
              ce("td",{style:{...S.td,color:"#f87171",fontWeight:600}},fmtMin(r.ht)),
              ce("td",{style:S.td},r.res||"–"),
              ce("td",{style:S.td},r.lid?ce("a",{href:UNITY(r.lid),target:"_blank",rel:"noreferrer",style:S.link},r.id,"… ↗"):"–")
            )),
            deadRows.length===0&&ce("tr",null,ce("td",{colSpan:6,style:{...S.td,textAlign:"center",color:"#6b7280"}},"Sin casos ≥",dtFilter," min"))
          )
        )
      )
    ),
    // ── Tab 2: Heatmap ──
    tab===2 && ce("div",{style:S.card},
      ce("div",{style:{overflowX:"auto"}},
        ce("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
          ce("thead",null,ce("tr",null,
            ce("th",{style:{...S.th,minWidth:68}},"Hora CDMX"),
            DAYS_ORDER.map(d=>ce("th",{key:d,style:{...S.th,textAlign:"center",minWidth:64}},DAY_LABEL[d])),
            ce("th",{style:{...S.th,textAlign:"right",minWidth:52}},"Total")
          )),
          ce("tbody",null,hours.map(h=>{
            const total=DAYS_ORDER.reduce((s,d)=>s+((heatMap[d]||{})[h]||0),0);
            return ce("tr",{key:h},
              ce("td",{style:{...S.td,fontWeight:600,color:"#9ca3af",whiteSpace:"nowrap"}},String(h).padStart(2,"0"),":00"),
              DAYS_ORDER.map(d=>{
                const v=(heatMap[d]||{})[h]||0;
                return ce("td",{key:d,style:{...S.td,textAlign:"center",background:heatColor(v),color:!v?"#374151":v<5?"#fff":v<15?"#14532d":"#fff",fontWeight:v>3?700:400,padding:"6px 4px"}},v||"");
              }),
              ce("td",{style:{...S.td,textAlign:"right",fontWeight:600,color:"#9ca3af"}},total)
            );
          }))
        )
      ),
      ce("div",{style:{padding:"10px 14px",fontSize:11,color:"#6b7280",borderTop:"1px solid #374151"}},"Datos PST (UTC-8) → Hora CDMX/CST (UTC-6) · +2h")
    ),
    // ── Tab 3: Gaps ──
    tab===3 && ce(React.Fragment,null,
      ce("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:16}},
        ce("span",{style:{fontSize:13,color:"#9ca3af",fontWeight:500}},"Filtrar gaps:"),
        ce("select",{value:gapMin,onChange:e=>setGapMin(Number(e.target.value)),style:{...S.sel,minWidth:160}},
          GAP_OPTIONS.map(o=>ce("option",{key:o.value,value:o.value},o.label))
        ),
        ce("span",{style:{fontSize:12,color:"#6b7280"}},"Todos los tiempos en hora CDMX (CST UTC-6)")
      ),
      ce("div",{style:{display:"flex",gap:16,flexWrap:"wrap"}},
        Object.entries(D.gp).map(([queue,gaps])=>{
          const visible=filteredGaps(gaps);
          return ce("div",{key:queue,style:{...S.card,flex:"1 1 400px"}},
            ce("div",{style:{padding:"12px 16px",borderBottom:"1px solid #374151",display:"flex",justifyContent:"space-between",alignItems:"center"}},
              ce("span",{style:{fontWeight:600,fontSize:14}},QUEUE_SHORT[queue]||queue),
              ce("div",{style:{display:"flex",gap:8,alignItems:"center"}},
                ce("span",{style:{fontSize:12,color:"#9ca3af"}},gaps.length," total"),
                ce("span",{style:{fontSize:12,color:"#f87171",background:"#2d1515",padding:"3px 10px",borderRadius:20,fontWeight:600}},visible.length," > ",gapMin," min")
              )
            ),
            visible.length===0
              ? ce("div",{style:{padding:"20px 16px",color:"#6b7280",fontSize:13,textAlign:"center"}},"Sin gaps > ",gapMin," min")
              : ce("div",{style:{overflowX:"auto"}},
                  ce("table",{style:{width:"100%",borderCollapse:"collapse"}},
                    ce("thead",null,ce("tr",null,
                      ["Día","Inicio CDMX","Fin CDMX","Duración","Último agente","Próximo agente"].map(h=>ce("th",{key:h,style:S.th},h))
                    )),
                    ce("tbody",null,visible.map((g,i)=>ce("tr",{key:i,style:{background:i%2?"#161d2e":"transparent"}},
                      ce("td",{style:S.td},DAY_LABEL[g.d]||g.d),
                      ce("td",{style:S.td},shiftTimeStr(g.s,PST_TO_CDMX)),
                      ce("td",{style:S.td},shiftTimeStr(g.e,PST_TO_CDMX)),
                      ce("td",{style:S.td},ce(GapBadge,{m:g.m})),
                      ce("td",{style:{...S.td,color:"#9ca3af",fontSize:12}},g.a1||"–"),
                      ce("td",{style:{...S.td,color:"#9ca3af",fontSize:12}},g.a2||"–")
                    )))
                  )
                )
          );
        })
      )
    )
  );
}

try {
  document.getElementById("loading").style.display="none";
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(Dashboard));
} catch(e) {
  document.getElementById("loading").innerHTML=
    '<div style="color:#f87171;padding:20px;font-family:monospace;font-size:13px"><b>Error:</b><br>'+e.message+'</div>';
}
</script>
</body>
</html>
